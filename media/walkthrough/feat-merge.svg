<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" fill="none" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="760" height="360" rx="16" fill="#16161a"/>
  <rect x="0.5" y="0.5" width="759" height="359" rx="15.5" stroke="#2c2c34"/>

  <text x="40" y="40" fill="#f2f2f5" font-size="20" font-weight="700">Merge boards to dedupe shared context</text>

  <!-- fork edges root -> A / B -->
  <path d="M192 168 C 230 168, 235 135, 268 130" stroke="#e0a458" stroke-width="2.5" stroke-dasharray="6 5" fill="none"/>
  <path d="M192 192 C 230 192, 235 268, 268 272" stroke="#e0a458" stroke-width="2.5" stroke-dasharray="6 5" fill="none"/>
  <!-- merge edges A / B -> merged -->
  <path d="M458 130 C 510 130, 525 188, 560 198" stroke="#6aa3e0" stroke-width="2.5" stroke-dasharray="6 5" fill="none"/>
  <path d="M458 272 C 515 272, 530 214, 560 206" stroke="#6aa3e0" stroke-width="2.5" stroke-dasharray="6 5" fill="none"/>

  <!-- root (deduped once) -->
  <g>
    <rect x="42" y="135" width="150" height="90" rx="12" fill="#1f1f26" stroke="#3a3a44"/>
    <text x="58" y="163" fill="#c9c9d4" font-size="13" font-weight="600">Root chat</text>
    <rect x="58" y="175" width="118" height="7" rx="3.5" fill="#34343e"/>
    <rect x="58" y="189" width="92" height="7" rx="3.5" fill="#2c2c34"/>
    <rect x="58" y="203" width="104" height="7" rx="3.5" fill="#2c2c34"/>
  </g>
  <!-- "sent once" annotation -->
  <text x="42" y="250" fill="#6aa3e0" font-size="11.5" font-weight="600">shared ancestor → sent once</text>

  <!-- branch A (selected) -->
  <g>
    <rect x="268" y="86" width="190" height="92" rx="12" fill="#1f1f26" stroke="#d97757" stroke-width="2.5"/>
    <circle cx="286" cy="106" r="5" fill="#e0a458"/>
    <text x="300" y="111" fill="#e0a458" font-size="12" font-weight="600">⑂ Branch A</text>
    <rect x="284" y="124" width="158" height="7" rx="3.5" fill="#34343e"/>
    <rect x="284" y="138" width="124" height="7" rx="3.5" fill="#2c2c34"/>
    <rect x="284" y="152" width="140" height="7" rx="3.5" fill="#2c2c34"/>
    <circle cx="446" cy="98" r="9" fill="#d97757"/>
    <text x="446" y="102" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">✓</text>
  </g>
  <!-- branch B (selected) -->
  <g>
    <rect x="268" y="226" width="190" height="92" rx="12" fill="#1f1f26" stroke="#d97757" stroke-width="2.5"/>
    <circle cx="286" cy="246" r="5" fill="#e0a458"/>
    <text x="300" y="251" fill="#e0a458" font-size="12" font-weight="600">⑂ Branch B</text>
    <rect x="284" y="264" width="158" height="7" rx="3.5" fill="#34343e"/>
    <rect x="284" y="278" width="110" height="7" rx="3.5" fill="#2c2c34"/>
    <rect x="284" y="292" width="134" height="7" rx="3.5" fill="#2c2c34"/>
    <circle cx="446" cy="238" r="9" fill="#d97757"/>
    <text x="446" y="242" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">✓</text>
  </g>

  <!-- merged node -->
  <g>
    <rect x="560" y="156" width="158" height="92" rx="12" fill="#1f1f26" stroke="#34506e" stroke-width="2"/>
    <circle cx="578" cy="176" r="5" fill="#6aa3e0"/>
    <text x="592" y="181" fill="#6aa3e0" font-size="12" font-weight="600">Merged chat</text>
    <rect x="576" y="194" width="126" height="7" rx="3.5" fill="#34343e"/>
    <rect x="576" y="208" width="98" height="7" rx="3.5" fill="#2c2c34"/>
    <rect x="576" y="222" width="112" height="7" rx="3.5" fill="#2c2c34"/>
  </g>

  <text x="40" y="338" fill="#9a9aa6" font-size="12.5">Box-select branches, then ⚡ Merge → new chat. Common ancestors are deduped; each branch's unique context is sent once.</text>
</svg>
