<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" fill="none" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="760" height="420" rx="16" fill="#16161a"/>
  <rect x="0.5" y="0.5" width="759" height="419" rx="15.5" stroke="#2c2c34"/>

  <!-- title -->
  <text x="40" y="58" fill="#f2f2f5" font-size="30" font-weight="700">Braid</text>
  <text x="40" y="86" fill="#9a9aa6" font-size="15">Turn linear chats into a node canvas · branch · dedupe-merge · collapsed summaries</text>

  <!-- edges (drawn first so nodes sit on top) -->
  <!-- root -> forkA / forkB : fork = amber dashed -->
  <path d="M180 175 C 240 175, 250 150, 300 150" stroke="#e0a458" stroke-width="2.5" stroke-dasharray="6 5" fill="none"/>
  <path d="M180 195 C 240 195, 250 250, 300 250" stroke="#e0a458" stroke-width="2.5" stroke-dasharray="6 5" fill="none"/>
  <!-- forkA / forkB -> merge : merge = blue dashed -->
  <path d="M470 150 C 530 150, 540 280, 600 300" stroke="#6aa3e0" stroke-width="2.5" stroke-dasharray="6 5" fill="none"/>
  <path d="M470 250 C 540 250, 560 295, 600 305" stroke="#6aa3e0" stroke-width="2.5" stroke-dasharray="6 5" fill="none"/>

  <!-- root node -->
  <g>
    <rect x="40" y="150" width="140" height="90" rx="12" fill="#1f1f26" stroke="#3a3a44"/>
    <text x="56" y="178" fill="#c9c9d4" font-size="13" font-weight="600">Root chat</text>
    <rect x="56" y="190" width="108" height="7" rx="3.5" fill="#34343e"/>
    <rect x="56" y="204" width="84" height="7" rx="3.5" fill="#2c2c34"/>
    <rect x="56" y="218" width="96" height="7" rx="3.5" fill="#2c2c34"/>
  </g>

  <!-- fork A -->
  <g>
    <rect x="300" y="105" width="170" height="90" rx="12" fill="#1f1f26" stroke="#5a4a30"/>
    <circle cx="318" cy="124" r="5" fill="#e0a458"/>
    <text x="332" y="129" fill="#e0a458" font-size="12" font-weight="600">⑂ Branch A</text>
    <rect x="316" y="142" width="138" height="7" rx="3.5" fill="#34343e"/>
    <rect x="316" y="156" width="110" height="7" rx="3.5" fill="#2c2c34"/>
    <rect x="316" y="170" width="124" height="7" rx="3.5" fill="#2c2c34"/>
  </g>

  <!-- fork B -->
  <g>
    <rect x="300" y="205" width="170" height="90" rx="12" fill="#1f1f26" stroke="#5a4a30"/>
    <circle cx="318" cy="224" r="5" fill="#e0a458"/>
    <text x="332" y="229" fill="#e0a458" font-size="12" font-weight="600">⑂ Branch B</text>
    <rect x="316" y="242" width="138" height="7" rx="3.5" fill="#34343e"/>
    <rect x="316" y="256" width="96" height="7" rx="3.5" fill="#2c2c34"/>
    <rect x="316" y="270" width="120" height="7" rx="3.5" fill="#2c2c34"/>
  </g>

  <!-- merge -->
  <g>
    <rect x="600" y="258" width="120" height="96" rx="12" fill="#1f1f26" stroke="#34506e"/>
    <circle cx="618" cy="278" r="5" fill="#6aa3e0"/>
    <text x="632" y="283" fill="#6aa3e0" font-size="12" font-weight="600">Merge</text>
    <rect x="616" y="296" width="88" height="7" rx="3.5" fill="#34343e"/>
    <rect x="616" y="310" width="72" height="7" rx="3.5" fill="#2c2c34"/>
    <rect x="616" y="324" width="84" height="7" rx="3.5" fill="#2c2c34"/>
  </g>

  <!-- legend -->
  <g transform="translate(40,372)">
    <line x1="0" y1="0" x2="26" y2="0" stroke="#e0a458" stroke-width="2.5" stroke-dasharray="6 5"/>
    <text x="34" y="4" fill="#9a9aa6" font-size="12">Branch</text>
    <line x1="96" y1="0" x2="122" y2="0" stroke="#6aa3e0" stroke-width="2.5" stroke-dasharray="6 5"/>
    <text x="130" y="4" fill="#9a9aa6" font-size="12">Merge (dedupe shared context)</text>
  </g>
</svg>
