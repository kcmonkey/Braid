<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" fill="none" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="760" height="300" rx="16" fill="#16161a"/>
  <rect x="0.5" y="0.5" width="759" height="299" rx="15.5" stroke="#2c2c34"/>

  <text x="40" y="42" fill="#f2f2f5" font-size="20" font-weight="700">Ask, then branch any board</text>

  <!-- fork edge (drawn under nodes) -->
  <path d="M340 158 C 400 158, 410 150, 460 150" stroke="#e0a458" stroke-width="2.5" stroke-dasharray="6 5" fill="none"/>

  <!-- root board with question + streaming answer + Branch button -->
  <g>
    <rect x="40" y="68" width="300" height="184" rx="12" fill="#1f1f26" stroke="#3a3a44"/>
    <rect x="58" y="86" width="224" height="24" rx="12" fill="#d97757"/>
    <text x="70" y="103" fill="#fff" font-size="12" font-weight="600">Optimize this SQL query?</text>
    <rect x="58" y="126" width="264" height="8" rx="4" fill="#34343e"/>
    <rect x="58" y="142" width="232" height="8" rx="4" fill="#2c2c34"/>
    <rect x="58" y="158" width="250" height="8" rx="4" fill="#2c2c34"/>
    <rect x="58" y="174" width="150" height="8" rx="4" fill="#2c2c34"/>
    <rect x="212" y="171" width="6" height="13" rx="2" fill="#d97757"/>
    <rect x="236" y="212" width="86" height="26" rx="6" fill="#241f1a" stroke="#e0a458"/>
    <text x="250" y="229" fill="#e0a458" font-size="12" font-weight="600">⑂ Branch</text>
  </g>

  <!-- child (branched) board -->
  <g>
    <rect x="460" y="84" width="260" height="150" rx="12" fill="#1f1f26" stroke="#5a4a30"/>
    <circle cx="478" cy="106" r="5" fill="#e0a458"/>
    <text x="492" y="111" fill="#e0a458" font-size="12" font-weight="600">⑂ Branch</text>
    <rect x="476" y="122" width="200" height="22" rx="11" fill="#d97757"/>
    <text x="487" y="138" fill="#fff" font-size="11" font-weight="600">What about indexing?</text>
    <rect x="476" y="156" width="228" height="8" rx="4" fill="#34343e"/>
    <rect x="476" y="172" width="190" height="8" rx="4" fill="#2c2c34"/>
    <rect x="476" y="188" width="212" height="8" rx="4" fill="#2c2c34"/>
  </g>

  <text x="40" y="284" fill="#9a9aa6" font-size="12.5">Your original conversation stays intact — each fork explores a new direction, forming a DAG.</text>
</svg>
